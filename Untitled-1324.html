    <style>
        body {
            margin: 0;
            background: transparent; /* Полностью прозрачный фон */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            gap: 24px; /* Расстояние между кнопками */
            justify-content: flex-start;
            flex-wrap: wrap;
            padding: 5px 0;
        }

        /* Прозрачный контейнер ссылки */
        .resource-link {
            display: flex;
            align-items: center;
            gap: 12px;
            background: transparent; /* Убран фон */
            text-decoration: none;
            color: #ffffff;
            transition: transform 0.2s ease;
        }

        /* Легкий эффект приподнимания при наведении */
        .resource-link:hover {
            transform: translateY(-2px);
        }

        /* Иконка Telegram */
        .card-icon {
            width: 40px;
            height: 40px;
            background: #229ED9; /* Фирменный цвет Telegram */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease;
        }

        /* Изменение цвета иконки при наведении */
        .resource-link:hover .card-icon {
            background: #2aa2dd; 
        }

        .card-icon svg {
            width: 22px;
            height: 22px;
            fill: #ffffff;
        }

        /* Текстовый блок */
        .card-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #f0f6fc;
            transition: color 0.2s ease;
        }

        /* Подсветка текста при наведении */
        .resource-link:hover .card-title {

        }

        .card-subtitle {
