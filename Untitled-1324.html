<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Убираем все отступы и делаем фон полностью прозрачным */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center; /* Центрируем картинку внутри блока */
            align-items: center;
        }

        /* Стиль самого изображения */
        .clean-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Картинка сохраняет пропорции и не обрезается */
            display: block;
        }
    </style>
</head>
<body>

    <!-- Замените "ИМЯ_ФАЙЛА.png" на точное имя картинки, которую вы загрузили на GitHub -->
    <img class="clean-image" src="НовыйХолст6фывыф.png" alt="Изображение">

</body>
</html>
